version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: diploma
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5432:5432"

  backend:
    build: ./backende
    ports:
      - "8000:8000"
    volumes:
      - ./backende:/app
    depends_on:
      - db



volumes:
  postgres_data: